<!DOCTYPE html>
<html>
<head>
    <title>Database</title>
    <meta http-equiv="refresh" content="5">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8dfe8;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #4b1e2f;
            margin-bottom: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            overflow: hidden;
        }

        th {
            background-color: #d98ca3;
            color: white;
            padding: 12px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background-color: #fcebf1;
        }

        .status {
            font-weight: bold;
            color: green;
        }
    </style>

</head>

<body>

<h1>Alle ordrer</h1>

<table>
    <tr>
        <th>ID</th>
        <th>Bord</th>
        <th>Mad</th>
        <th>Drikke</th>
        <th>Note</th>
        <th>Tidspunkt</th>
        <th>Status</th>
    </tr>

    {% for order in orders %}
    <tr>
        <td>{{ order.id }}</td>
        <td>{{ order.table_number }}</td>
        <td>{{ order.items }}</td>
        <td>{{ order.drinks }}</td>
        <td>{{ order.note }}</td>
        <td>{{ order.created_at }}</td>
        <td class="status">{{ order.status }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
